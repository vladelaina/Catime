# CLI Help Dialog
"CliHelpTitle"="Catime コマンドラインヘルプ"
"CliHelpContent"="使用法: catime <argument>\n\nカウントダウン入力（画面と同じ規則）:\n  25=25 分\n  25h=25 時間\n  25s=25 秒\n  2h3m=2 時間 3 分\n  25 30=25 分 30 秒\n  1 30 20=1 時間 30 分 20 秒\n  17 20t=17:20 までカウントダウン\n  9 9 9t=09:09:09 までカウントダウン\n\nクイックモード（短縮コマンド）:\n  s         = 現在時刻を表示\n  u         = カウントアップを開始\n  q1        = クイックカウントダウン 1 を開始\n  q2        = クイックカウントダウン 2 を開始\n  q3        = クイックカウントダウン 3 を開始\n  p         = Pomodoro を開始\n  p<number> = 番号でクイックカウントダウンを開始（例: p4）\n  v         = 表示と非表示を切り替え\n  e         = 編集モードに入る\n  pr        = タイマーを一時停止または再開\n  r         = 現在のタイマーを再スタート\n\n  h         = このヘルプを表示\n例:\n  catime 25\n  catime 17 20t\n  catime q1\n  catime v\n  catime p4\n"

