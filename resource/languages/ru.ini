# CLI Help Dialog
"CliHelpTitle"="Справка командной строки Catime"
"CliHelpContent"="Использование: catime <argument>\n\nВвод обратного отсчёта (те же правила, что в интерфейсе):\n  25=25 минут\n  25h=25 часов\n  25s=25 секунд\n  2h3m=2 часа 3 минуты\n  25 30=25 минут 30 секунд\n  1 30 20=1 час 30 минут 20 секунд\n  17 20t=Обратный отсчёт до 17:20\n  9 9 9t=Обратный отсчёт до 09:09:09\n\nБыстрые режимы (короткие команды):\n  s         = показать текущее время\n  u         = запустить прямой отсчёт\n  q1        = запустить быстрый отсчёт 1\n  q2        = запустить быстрый отсчёт 2\n  q3        = запустить быстрый отсчёт 3\n  p         = запустить Помодоро\n  p<number> = запустить быстрый отсчёт по индексу (например, p4)\n  v         = переключить видимость окна\n  e         = войти в режим редактирования\n  pr        = приостановить или продолжить таймер\n  r         = перезапустить текущий таймер\n\n  h         = показать эту справку\nПримеры:\n  catime 25\n  catime 17 20t\n  catime q1\n  catime v\n  catime p4\n"

