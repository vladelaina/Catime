# CLI Help Dialog
"CliHelpTitle"="Ayuda de línea de comandos de Catime"
"CliHelpContent"="Uso: catime <argument>\n\nEntradas de cuenta regresiva (mismas reglas que en la interfaz):\n  25=25 minutos\n  25h=25 horas\n  25s=25 segundos\n  2h3m=2 horas 3 minutos\n  25 30=25 minutos 30 segundos\n  1 30 20=1 hora 30 minutos 20 segundos\n  17 20t=Cuenta regresiva hasta las 17:20\n  9 9 9t=Cuenta regresiva hasta las 09:09:09\n\nModos rápidos (comandos cortos):\n  s         = mostrar la hora actual\n  u         = iniciar cuenta ascendente\n  q1        = iniciar cuenta regresiva rápida 1\n  q2        = iniciar cuenta regresiva rápida 2\n  q3        = iniciar cuenta regresiva rápida 3\n  p         = iniciar Pomodoro\n  p<number> = iniciar una cuenta rápida por índice (p. ej., p4)\n  v         = alternar la visibilidad\n  e         = entrar en modo de edición\n  pr        = pausar o reanudar el temporizador\n  r         = reiniciar el temporizador actual\n\n  h         = mostrar este diálogo de ayuda\nEjemplos:\n  catime 25\n  catime 17 20t\n  catime q1\n  catime v\n  catime p4\n"

