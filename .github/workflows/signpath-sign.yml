name: SignPath Code Signing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'GitHub artifact name to sign'
        required: true
        type: string
      artifact-id:
        description: 'GitHub artifact ID to sign'
        required: true
        type: string
      version:
        description: 'Version string for signing'
        required: true
        type: string
      is-release:
        description: 'Whether this is a release build'
        required: false
        type: boolean
        default: false
      archive-signed-artifact:
        description: 'Whether to zip the signed artifact before upload'
        required: false
        type: boolean
        default: true
    secrets:
      SIGNPATH_API_TOKEN:
        description: 'SignPath API Token'
        required: true
    outputs:
      signed-artifact-id:
        description: 'ID of the signed artifact'
        value: ${{ jobs.code-signing.outputs.signed-artifact-id }}
      signing-request-id:
        description: 'SignPath signing request ID'
        value: ${{ jobs.code-signing.outputs.signing-request-id }}

jobs:
  code-signing:
    if: github.repository == 'vladelaina/Catime'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    outputs:
      signed-artifact-id: ${{ steps.upload-signed.outputs.artifact-id }}
      signing-request-id: ${{ steps.signpath-submit.outputs.signing-request-id }}
    
    steps:
    - name: Submit to SignPath for signing
      id: signpath-submit
      uses: signpath/github-action-submit-signing-request@v2
      with:
        api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
        organization-id: '66aa6e96-a394-43f9-b3c3-65214fcd285d'
        project-slug: 'Catime'
        signing-policy-slug: ${{ inputs.is-release && 'release-signing' || 'test-signing' }}  # Use conditional signing policy
        github-artifact-id: ${{ inputs.artifact-id }}
        wait-for-completion: true
        output-artifact-directory: './signed-output'
        parameters: |
          version: ${{ toJSON(inputs.version) }}
          build_type: ${{ toJSON(inputs.is-release && 'release' || 'development') }}

    - name: Delete unsigned signing input
      continue-on-error: true
      uses: actions/github-script@v8
      with:
        script: |
          const artifactId = Number(${{ toJSON(inputs.artifact-id) }});
          if (!Number.isSafeInteger(artifactId) || artifactId <= 0) {
            core.setFailed(`Invalid unsigned artifact ID: ${{ inputs.artifact-id }}`);
            return;
          }
          await github.rest.actions.deleteArtifact({
            owner: context.repo.owner,
            repo: context.repo.repo,
            artifact_id: artifactId,
          });
          
    - name: Extract signed files
      run: |
        echo "Signed output directory contents:"
        find ./signed-output -type f -exec ls -la {} \;
        
        # If signed output is a ZIP file, extract it
        if find ./signed-output -name "*.zip" | grep -q .; then
          echo "Extracting ZIP file..."
          cd ./signed-output
          find . -name "*.zip" -exec unzip -o {} \;
          cd ..
        fi
        
        echo "Signed .exe files:"
        find ./signed-output -name "*.exe" -exec ls -la {} \;
        
    - name: Verify signed files exist
      run: |
        SIGNED_FILES=$(find ./signed-output -name "*.exe" | wc -l)
        if [ "$SIGNED_FILES" -eq 0 ]; then
          echo "Error: No signed .exe files found!"
          exit 1
        fi
        echo "Found $SIGNED_FILES signed executable files"
        
    - name: Upload signed artifacts
      id: upload-signed
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        path: ./signed-output/*.exe
        retention-days: 90
        archive: ${{ inputs.archive-signed-artifact }}
        
