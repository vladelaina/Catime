name: Release Catime

on:
  push:
    tags:
      - 'v*'

# Add permissions configuration
permissions:
  contents: write
  actions: write

jobs:
  publishing-policy:
    name: security / publishing-policy
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Validate publishing guards
      run: python3 .github/scripts/ci/check_publish_guards.py

  build:
    needs: publishing-policy
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_version: ${{ steps.get_version.outputs.tag_version }}
      artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up deterministic Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.18.0'

    - name: Set up China timezone
      run: |
        sudo timedatectl set-timezone Asia/Shanghai
        echo "Current timezone: $(date +%Z)"
        echo "Current time: $(date)"
        
    - name: Install MinGW compiler and CMake
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64 cmake
        cmake --version
        
    - name: Extract version number
      id: get_version
      run: |
        VERSION=$(grep -oP '#define CATIME_VERSION "\K[^"]+' resource/resource.h)
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
        # Get tag name without 'v' prefix
        TAG_VERSION=${GITHUB_REF#refs/tags/v}
        if [ "$TAG_VERSION" != "$VERSION" ]; then
          echo "::error::Tag version ($TAG_VERSION) does not match resource version ($VERSION)"
          exit 1
        fi
        echo "TAG_VERSION=$TAG_VERSION" >> $GITHUB_ENV
        echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT
      
    - name: Build application
      run: |
        node -e "const expected='1.3.1-e00f703'; if (process.versions.zlib !== expected) { console.error('Unexpected zlib: ' + process.versions.zlib); process.exit(1); }"

        # Make build script executable
        chmod +x build.sh
        
        # Build using the same script as local development
        ./build.sh Release
        
        # Copy and rename the executable from build directory
        mkdir -p output
        cp build/catime.exe ./output/catime_${{ env.TAG_VERSION }}.exe
        echo "Verifying release binary architecture..."
        i686-w64-mingw32-objdump -f ./output/catime_${{ env.TAG_VERSION }}.exe | tee ./output/pe-header.txt
        if ! grep -q "file format pei-i386" ./output/pe-header.txt; then
          echo "::error::Release binary must be 32-bit Win32 (pei-i386)."
          exit 1
        fi
        echo "Build completed using build.sh script"
        
    - name: Upload unsigned release artifact
      id: upload-unsigned
      uses: actions/upload-artifact@v7
      with:
        name: catime-signing-input-${{ github.run_id }}-${{ github.run_attempt }}
        path: output/catime_${{ env.TAG_VERSION }}.exe
        retention-days: 1

  # Code signing job
  sign:
    if: github.repository == 'vladelaina/Catime'
    needs: build
    uses: ./.github/workflows/signpath-sign.yml
    with:
      artifact-name: catime-release-${{ needs.build.outputs.tag_version }}-${{ github.run_attempt }}
      artifact-id: ${{ needs.build.outputs.artifact-id }}
      version: ${{ needs.build.outputs.tag_version }}
      is-release: true
    secrets:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}

  # Build the Microsoft Store package from the signed EXE.
  # It remains a workflow artifact and is not attached to the GitHub Release.
  store-package:
    if: github.repository == 'vladelaina/Catime'
    needs: [build, sign]
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Download signed executable
      uses: actions/download-artifact@v8
      with:
        name: catime-release-${{ needs.build.outputs.tag_version }}-${{ github.run_attempt }}
        path: ./signed-release

    - name: Build Microsoft Store package
      shell: pwsh
      run: |
        ./packaging/microsoft-store/build-store-package.ps1 `
          -ExecutablePath "./signed-release/catime_${{ needs.build.outputs.tag_version }}.exe" `
          -Version "${{ needs.build.outputs.tag_version }}" `
          -OutputDirectory "./store-output"

    - name: Upload Microsoft Store MSIX
      uses: actions/upload-artifact@v7
      with:
        name: catime-store-msix-${{ needs.build.outputs.tag_version }}-${{ github.run_attempt }}
        path: store-output/catime_${{ needs.build.outputs.tag_version }}_x86.msix
        if-no-files-found: error
        retention-days: 90
        archive: false

  # Release job
  release:
    if: github.repository == 'vladelaina/Catime'
    needs: [build, sign]
    runs-on: ubuntu-latest
    
    steps:
    - name: Download signed artifact
      uses: actions/download-artifact@v8
      with:
        name: catime-release-${{ needs.build.outputs.tag_version }}-${{ github.run_attempt }}
        path: ./signed-release

    - name: Validate Winget token
      env:
        WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
      run: |
        if [ -z "$WINGET_TOKEN" ]; then
          echo "::error::WINGET_TOKEN is required before creating a release with Winget publishing enabled."
          exit 1
        fi

    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        files: ./signed-release/catime_${{ needs.build.outputs.tag_version }}.exe
        name: ${{ github.ref_name }}
        body: |
          # Changelog

          > [!TIP]
          > My friend, while downloading Catime, why not check out my friend's [Easy-Cat-Timer](https://github.com/xujiangjiang/Easy-Cat-Timer) - a super cute and practical countdown timer!
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Update Winget Package
      uses: vedantmgoyal2009/winget-releaser@v2
      with:
        identifier: VladElaina.Catime
        version: ${{ needs.build.outputs.tag_version }}
        release-tag: ${{ github.ref_name }}
        installers-regex: '^catime_${{ needs.build.outputs.tag_version }}\.exe$'
        token: ${{ secrets.WINGET_TOKEN }}

  chocolatey:
    if: github.repository == 'vladelaina/Catime'
    needs: [build, release]
    uses: ./.github/workflows/chocolatey.yml
    with:
      version: ${{ needs.build.outputs.tag_version }}
    secrets:
      CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
