name: Release Catime

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  WINLIBS_ARCHIVE_NAME: winlibs-i686-posix-dwarf-gcc-16.1.0-mingw-w64ucrt-14.0.0-r3.zip
  WINLIBS_URL: https://github.com/brechtsanders/winlibs_mingw/releases/download/16.1.0posix-14.0.0-ucrt-r3/winlibs-i686-posix-dwarf-gcc-16.1.0-mingw-w64ucrt-14.0.0-r3.zip
  WINLIBS_SHA256: C4C7419F2820AC2E169DC86F1397A07DEFF20297A107C7A1CA486643D8D435BE

on:
  push:
    tags:
      - 'v*'

# Add permissions configuration
permissions:
  contents: write
  actions: write

jobs:
  publishing-policy:
    name: security / publishing-policy
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Validate publishing guards
      run: python3 .github/scripts/ci/check_publish_guards.py

  build:
    needs: publishing-policy
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_version: ${{ steps.get_version.outputs.tag_version }}
      artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up deterministic Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.18.0'

    - name: Cache pinned WinLibs archive
      uses: actions/cache@v5
      with:
        path: ${{ runner.temp }}\winlibs-cache
        key: winlibs-i686-gcc-16.1.0-${{ env.WINLIBS_SHA256 }}

    - name: Set up pinned WinLibs i686 compiler
      shell: pwsh
      run: |
        ./.github/scripts/ci/setup_winlibs_i686.ps1 `
          -ArchiveDirectory "${{ runner.temp }}\winlibs-cache" `
          -InstallDirectory "${{ runner.temp }}\winlibs-toolchain" `
          -ArchiveName "${{ env.WINLIBS_ARCHIVE_NAME }}" `
          -DownloadUrl "${{ env.WINLIBS_URL }}" `
          -ExpectedSha256 "${{ env.WINLIBS_SHA256 }}"

    - name: Set up China timezone
      shell: pwsh
      run: Set-TimeZone -Id "China Standard Time"
        
    - name: Extract version number
      id: get_version
      shell: pwsh
      run: |
        $header = Get-Content "resource/resource.h" -Raw
        if ($header -notmatch '#define\s+CATIME_VERSION\s+"([^"]+)"') {
          throw "Unable to extract CATIME_VERSION"
        }
        $version = $Matches[1]
        $tagVersion = $env:GITHUB_REF -replace '^refs/tags/v', ''
        if ($tagVersion -ne $version) {
          throw "Tag version ($tagVersion) does not match resource version ($version)"
        }
        "VERSION=$version" >> $env:GITHUB_ENV
        "version=$version" >> $env:GITHUB_OUTPUT
        "TAG_VERSION=$tagVersion" >> $env:GITHUB_ENV
        "tag_version=$tagVersion" >> $env:GITHUB_OUTPUT
        Write-Host "Version: $version"
      
    - name: Build application
      shell: pwsh
      run: |
        ./.github/scripts/ci/build_mingw_i686.ps1
        New-Item -ItemType Directory -Path "output" -Force | Out-Null
        Copy-Item -LiteralPath "build/catime.exe" `
          -Destination "output/catime_${{ env.TAG_VERSION }}.exe"
        
    - name: Upload unsigned release artifact
      id: upload-unsigned
      uses: actions/upload-artifact@v7
      with:
        name: catime-signing-input-${{ github.run_id }}-${{ github.run_attempt }}
        path: output/catime_${{ env.TAG_VERSION }}.exe
        retention-days: 1

  # Code signing job
  sign:
    if: github.repository == 'vladelaina/Catime'
    needs: build
    uses: ./.github/workflows/signpath-sign.yml
    with:
      artifact-name: catime-release-${{ needs.build.outputs.tag_version }}-${{ github.run_attempt }}
      artifact-id: ${{ needs.build.outputs.artifact-id }}
      version: ${{ needs.build.outputs.tag_version }}
      is-release: true
    secrets:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}

  # Build the Microsoft Store package from the signed EXE.
  # It remains a workflow artifact and is not attached to the GitHub Release.
  store-package:
    if: github.repository == 'vladelaina/Catime'
    needs: [build, sign]
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up deterministic Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.18.0'

    - name: Download signed executable
      uses: actions/download-artifact@v8
      with:
        artifact-ids: ${{ needs.sign.outputs.signed-artifact-id }}
        path: ./signed-release

    - name: Build Microsoft Store package
      shell: pwsh
      run: |
        ./packaging/microsoft-store/build-store-package.ps1 `
          -ExecutablePath "./signed-release/catime_${{ needs.build.outputs.tag_version }}.exe" `
          -Version "${{ needs.build.outputs.tag_version }}" `
          -OutputDirectory "./store-output"

    - name: Upload Microsoft Store MSIX
      uses: actions/upload-artifact@v7
      with:
        name: catime-store-msix-${{ needs.build.outputs.tag_version }}-${{ github.run_attempt }}
        path: store-output/catime_${{ needs.build.outputs.tag_version }}_x86.msix
        if-no-files-found: error
        retention-days: 90
        archive: false

  # Release job
  release:
    if: github.repository == 'vladelaina/Catime'
    needs: [build, sign]
    runs-on: ubuntu-latest
    
    steps:
    - name: Download signed artifact
      uses: actions/download-artifact@v8
      with:
        artifact-ids: ${{ needs.sign.outputs.signed-artifact-id }}
        path: ./signed-release

    - name: Validate Winget token
      env:
        WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
      run: |
        if [ -z "$WINGET_TOKEN" ]; then
          echo "::error::WINGET_TOKEN is required before creating a release with Winget publishing enabled."
          exit 1
        fi

    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        files: ./signed-release/catime_${{ needs.build.outputs.tag_version }}.exe
        name: ${{ github.ref_name }}
        body: |
          # Changelog

          > [!TIP]
          > My friend, while downloading Catime, why not check out my friend's [Easy-Cat-Timer](https://github.com/xujiangjiang/Easy-Cat-Timer) - a super cute and practical countdown timer!

          ---
          # 📥 Download

          <a href="https://apps.microsoft.com/detail/9n3mzdf1z34v?referrer=appbadge&mode=full" target="_blank" rel="noopener noreferrer">
            <img src="https://get.microsoft.com/images/en-us%20light.svg" width="600"/>
          </a>

          - Chocolatey

            ```
            choco install catime
            ```

          - Scoop

            ```
            scoop bucket add extras

            scoop install catime
            ```

          - Winget

            ```
            winget install --id VladElaina.Catime
            ```
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Update Winget Package
      uses: vedantmgoyal2009/winget-releaser@v2
      with:
        identifier: VladElaina.Catime
        version: ${{ needs.build.outputs.tag_version }}
        release-tag: ${{ github.ref_name }}
        installers-regex: '^catime_${{ needs.build.outputs.tag_version }}\.exe$'
        token: ${{ secrets.WINGET_TOKEN }}

  chocolatey:
    if: github.repository == 'vladelaina/Catime'
    needs: [build, release]
    uses: ./.github/workflows/chocolatey.yml
    with:
      version: ${{ needs.build.outputs.tag_version }}
    secrets:
      CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
